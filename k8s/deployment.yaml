apiVersion: apps/v1
kind: Deployment
metadata:
  name: mltest-deployment
  labels:
    app: mltest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mltest
  template:
    metadata:
      labels:
        app: mltest
    spec:
      containers:
      - name: mltest-container
        image: 831867297346.dkr.ecr.us-east-1.amazonaws.com/qa/mlops:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1024Mi"
